<script>
  const bubble = document.getElementById('speech-bubble');

  function showBubble() {
    if (bubble) {
      bubble.style.opacity = '1';
      setTimeout(() => {
        bubble.style.opacity = '0';
      }, 3000);
    }
  }

  // Hiện lần đầu sau 1s, sau đó mỗi 5s
  setTimeout(() => {
    showBubble();
    setInterval(showBubble, 5000);
  }, 1000);
</script>
